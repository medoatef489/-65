<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسئلة أكمل | الفصل الخامس - تأخر الكلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        /* الوان الوضع النهاري */
        body.light {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --border: #cbd5e1;
            --input: #ffffff;
            --btn: #2c7da0;
            --btn-hover: #1f5e7a;
            --correct: #166534;
            --correct-bg: #dcfce7;
            --wrong: #b91c1c;
            --wrong-bg: #fee2e2;
            --header: #ffffff;
            background: var(--bg);
            color: var(--text);
        }

        /* الوان الوضع الليلي */
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --input: #0f172a;
            --btn: #3b82f6;
            --btn-hover: #2563eb;
            --correct: #4ade80;
            --correct-bg: #14532d;
            --wrong: #f87171;
            --wrong-bg: #7f1a1a;
            --header: #1e293b;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            background: var(--header);
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--btn);
        }

        .title p {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chapters-btn {
            background: var(--btn);
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .theme-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 3rem;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        /* بطاقات الأسئلة */
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .question-card {
            background: var(--card);
            border-radius: 1.2rem;
            padding: 1.3rem;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .blank {
            display: inline-block;
            min-width: 100px;
            background: var(--input);
            border-bottom: 3px dotted var(--btn);
            padding: 0 5px;
            color: var(--btn);
            font-weight: bold;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 0.8rem 0 0.5rem;
        }

        .answer-input {
            flex: 2;
            min-width: 200px;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid var(--border);
            background: var(--input);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--btn);
        }

        .check-btn {
            background: var(--btn);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Cairo', sans-serif;
        }

        .feedback {
            margin-top: 0.6rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            display: inline-block;
        }

        .feedback.correct {
            background: var(--correct-bg);
            color: var(--correct);
        }

        .feedback.wrong {
            background: var(--wrong-bg);
            color: var(--wrong);
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 0.4rem;
        }

        .footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .input-area { flex-direction: column; }
            .check-btn { justify-content: center; }
        }
    </style>
</head>
<body class="light">
<div class="container">
    <div class="header">
        <div class="title">
            <h1><i class="fas fa-pen-fill"></i> أسئلة أكمل (الفصل الخامس)</h1>
            <p><i class="fas fa-microphone-alt"></i> مادة تأخر الكلام | 20 سؤالاً من المحتوى الأصلي</p>
        </div>
        <div class="controls">
            <button class="chapters-btn" id="chaptersBtn"><i class="fas fa-layer-group"></i> الفصول الأخرى</button>
            <button class="theme-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="questions-list" id="questionsList"></div>
    <div class="footer">
        <i class="fas fa-lightbulb"></i> كل سؤال به فراغ ..... اكتب الإجابة ثم اضغط "تحقق"
    </div>
</div>

<script>
    // ========== 20 سؤال من الفصل الخامس (من ملف الوورد) ==========
    const questionsData = [
        { text: "تبدأ عملية التدريب باكتساب الطفل حصيلة لغوية ........ وتعبيرية.", answer: "استقبالية" },
        { text: "من مهارات برامج المتأخرين لغوياً: مهارات وفق مبادئ تعديل ........ (تعزيز إيجابي/سلبي).", answer: "السلوك" },
        { text: "التدريب الفسيولوجي لأعضاء الجهاز الكلامي يتضمن إكساب الطفل التحكم في إيقاع الشهيق و ........", answer: "الزفير" },
        { text: "من تدريبات المضغ والنفخ والمس: التدريب على المص، النفخ (قصفات ورق، إطفاء ........).", answer: "شموع" },
        { text: "تدريبات تقوية هواء الزفير تشمل أخذ نفس عميق، حبسه، إخراجه ........", answer: "ببطء" },
        { text: "تدريبات اللسان تشمل التحكم بحركات اللسان: إخراج، تحريك، رفع الأجزاء ........ والأمامي.", answer: "الخلفي" },
        { text: "الانتباه يعتبر عنصراً ........ فبدونه لا فائدة من التعليمات.", answer: "أساسي" },
        { text: "من أهداف التدريب على الانتباه: تنمية الحصيلة اللغوية الداخلية (لفظية وغير لفظية) القائمة على ........", answer: "التقليد" },
        { text: "تنمية المفاهيم اللغوية تشمل البيئة المنزلية، البيئة المدرسية، البيئة ........", answer: "الخارجية" },
        { text: "من أنشطة زيادة الحصيلة اللغوية: الغناء، حفظ الأناشيد المصورة، اللعب ........ والإيهامي.", answer: "التمثيلي" },
        { text: "من أنشطة اكتساب المدلول اللفظي: الأضداد (كبير/صغير، طويل/قصير، خفيف/........)", answer: "ثقيل" },
        { text: "العلاقات المكانية تشمل: فوق/تحت، بين، يمين/يسار، قدام/ورا، قريب/بعيد، جوه/........", answer: "بره" },
        { text: "أنشطة اللعب الإيهامي تستخدم العرائس والدمى لتكوين علاقة وحوار، مما ينمي التركيز والانتباه و........", answer: "التقليد" },
        { text: "القصص الوصفية يفضل أن تحتوي على جمل مركبة (لا تزيد عن 4 جمل) وتتضمن ........ الأشياء.", answer: "وصف" },
        { text: "المعززات الاجتماعية والنشاطية: الخروج للحدائق، الثناء، المدح، التصفيق لل........", answer: "الآخرين" },
        { text: "من سمات أخصائي التخاطب: روح الحس والتعاطف مع الحالة، والود و........", answer: "المحبة" },
        { text: "الاتجاه التقليدي يعتمد على التدريب ........ كمرحلة سابقة على إنتاج الصوت.", answer: "السمعي" },
        { text: "في مدخل السمات المميزة، الهدف مساعدة الطفل على تعلم قواعد النسق الفونولوجي للراشدين وتعلم ........ المميزة.", answer: "السمات" },
        { text: "اتجاه ماكدونالد ينتقد التأكيد على التدريب السمعي فقط (قناة حسية واحدة) وعدم الاستفادة من ........ الأخرى.", answer: "القنوات" },
        { text: "مراحل العلاج في نموذج ماكدونالد: تقليد المثيرات الحسية، تعزيز النطق الصحيح للصوت المعيب، تسهيل النطق الصحيح في ........ صوتية متنوعة.", answer: "سياقات" }
    ];

    // عرض الأسئلة
    function renderQuestions() {
        const container = document.getElementById('questionsList');
        container.innerHTML = '';

        questionsData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            // استبدال النقاط بعلامة فارغة
            const questionHtml = q.text.replace(/\.\.\.\.\.\./g, '<span class="blank">......</span>');
            
            card.innerHTML = `
                <div class="question-text">
                    <span style="font-weight:800; margin-left:8px; color:var(--btn);">${index+1}.</span>
                    ${questionHtml}
                </div>
                <div class="input-area">
                    <input type="text" class="answer-input" id="input_${index}" placeholder="اكتب الإجابة هنا..." autocomplete="off">
                    <button class="check-btn" data-id="${index}"><i class="fas fa-check"></i> تحقق</button>
                </div>
                <div id="feedback_${index}" class="feedback"></div>
                <div class="hint"><i class="fas fa-edit"></i> الإجابة قصيرة (1-4 كلمات)</div>
            `;
            container.appendChild(card);
        });

        // إضافة حدث لكل زر تحقق
        document.querySelectorAll('.check-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const input = document.getElementById(`input_${id}`);
                const userAnswer = input.value.trim();
                const correctAnswer = questionsData[id].answer;
                const feedbackDiv = document.getElementById(`feedback_${id}`);

                // تطبيع النص للمقارنة
                const normalize = (str) => str.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[،,؟?!]/g, '');
                
                if (normalize(userAnswer) === normalize(correctAnswer)) {
                    feedbackDiv.innerHTML = `<i class="fas fa-check-circle"></i> صحيح! الإجابة: ${correctAnswer}`;
                    feedbackDiv.className = "feedback correct";
                    input.style.borderColor = "var(--correct)";
                } else {
                    feedbackDiv.innerHTML = `<i class="fas fa-times-circle"></i> خطأ. الإجابة الصحيحة: "${correctAnswer}"`;
                    feedbackDiv.className = "feedback wrong";
                    input.style.borderColor = "var(--wrong)";
                }
                
                // إعادة تعيين الحدود عند الكتابة مرة أخرى
                input.addEventListener('focus', () => {
                    input.style.borderColor = "var(--border)";
                }, { once: true });
            });
        });

        // الضغط على Enter
        document.querySelectorAll('.answer-input').forEach((input, idx) => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const btn = document.querySelector(`.check-btn[data-id="${idx}"]`);
                    if (btn) btn.click();
                }
            });
        });
    }

    // الثيم (وضع نهاري/ليلي)
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
        }
    }

    function toggleTheme() {
        if (document.body.classList.contains('light')) {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
        }
    }

    // زر الفصول الأخرى
    function setupChapters() {
        document.getElementById('chaptersBtn').addEventListener('click', () => {
            alert("📚 حاليًا يعرض الفصل الخامس.\nيمكن إضافة روابط لباقي الفصول بسهولة لاحقًا.");
        });
    }

    // بدء التشغيل
    document.addEventListener('DOMContentLoaded', () => {
        renderQuestions();
        initTheme();
        setupChapters();
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    });
</script>
</body>
</html>
